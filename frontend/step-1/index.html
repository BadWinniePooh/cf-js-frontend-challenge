<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFreeze Board — Step 1: &lt;cfb-tag&gt;</title>
    <link rel="stylesheet" href="../styles.css">
    <script type="module" src="index.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     Use this area to test your <cfb-tag> component.

     Once you have implemented cfb-tag.js and registered it in
     index.js, replace the <span> placeholders below with your
     custom elements, e.g.:

       <cfb-tag data-label="Keynote" data-color="blue"></cfb-tag>

     ═══════════════════════════════════════════════════════════ -->

<main style="padding: 24px; display: flex; flex-wrap: wrap; gap: 8px;">

    <!-- Replace these static spans with your <cfb-tag> elements -->
    <span class="cfb-tag cfb-tag--blue">Keynote</span>
    <span class="cfb-tag cfb-tag--red">Frontend</span>
    <span class="cfb-tag cfb-tag--orange">Workshop</span>
    <span class="cfb-tag cfb-tag--green">A11y</span>
    <span class="cfb-tag cfb-tag--purple">Molecule</span>
    <span class="cfb-tag">Default</span>
    <cfb-tag data-label="Keynote" data-color="blue"></cfb-tag>
    <cfb-tag data-color="blue"></cfb-tag>
    <cfb-tag/>

</main>

</body>
</html>
