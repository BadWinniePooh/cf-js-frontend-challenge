<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFreeze Board — Step 1: &lt;cfb-tag&gt;</title>
    <link rel="stylesheet" href="../styles.css">
    <script type="module" src="index.js"></script>
</head>
<body>

<header class="page-header">
    <h1>Step 1 — <code>&lt;cfb-tag&gt;</code></h1>
    <p>Your first custom element · an atom</p>
</header>

<!-- ═══════════════════════════════════════════════════════════
     Use this area to test your <cfb-tag> component.

     Once you have implemented cfb-tag.js and registered it in
     index.js, replace the <span> placeholders below with your
     custom elements, e.g.:

       <cfb-tag data-label="Keynote" data-color="blue"></cfb-tag>

     ═══════════════════════════════════════════════════════════ -->
<main style="padding: 24px; display: flex; flex-wrap: wrap; gap: 8px;">

    <cfb-tag data-label="Keynote" data-color="blue" data-count="3"></cfb-tag>
    <cfb-tag data-label="Frontend" data-color="red"></cfb-tag>
    <cfb-tag data-label="Workshop" data-color="orange"></cfb-tag>
    <cfb-tag data-label="A11y" data-color="green"></cfb-tag>
    <cfb-tag data-label="Molecule" data-color="purple"></cfb-tag>
    <cfb-tag></cfb-tag>

</main>

</body>
</html>
