<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFreeze Board — Step 7: Load from Backend</title>
    <link rel="stylesheet" href="../styles.css">
    <script type="importmap">
        {
          "imports": {
            "msw": "./node_modules/msw/lib/core/index.mjs",
            "msw/browser": "./node_modules/msw/lib/browser/index.mjs",

            "document": "this is also needed for msw mocking, but these must be through ESM.sh",
            "@mswjs/interceptors/WebSocket": "https://esm.sh/@mswjs/interceptors/WebSocket",
            "@mswjs/interceptors": "https://esm.sh/@mswjs/interceptors",
            "outvariant": "https://esm.sh/outvariant",
            "rettime": "https://esm.sh/rettime",
            "until-async": "https://esm.sh/until-async",
            "headers-polyfill": "https://esm.sh/headers-polyfill",
            "is-node-process": "https://esm.sh/is-node-process",
            "tough-cookie": "https://esm.sh/tough-cookie",
            "strict-event-emitter": "https://esm.sh/strict-event-emitter",
            "path-to-regexp": "https://esm.sh/path-to-regexp",
            "graphql": "https://esm.sh/graphql",
                "@open-draft/deferred-promise": "https://esm.sh/@open-draft/deferred-promise",
            "end": "this is also needed for msw mocking"
          }
        }
    </script>

    <script type="module" src="index.js"></script>

    <style>
        /* ── Layout ─────────────────────────────────────────────────────── */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
        }

        .controls label {
            font-size: .85rem;
            color: #555;
        }

        .controls button {
            padding: 6px 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: .85rem;
        }

        .controls button.active,
        .controls button:hover {
            background: #1a1a2e;
            color: #fff;
            border-color: #1a1a2e;
        }

        /* ── Loader status pills ────────────────────────────────────────── */
        .loader-status {
            display: flex;
            gap: 12px;
            padding: 12px 24px;
            background: #fafafa;
            border-bottom: 1px solid #e8e8e8;
        }

        cfb-schedule-loader,
        cfb-session-loader {
            display: block;
            font-size: .75rem;
            font-family: monospace;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid #ccc;
            background: #fff;
            color: #555;
        }

        cfb-schedule-loader[data-state="loading"],
        cfb-session-loader[data-state="loading"] {
            border-color: #f0a500;
            background: #fffbeb;
            color: #7a5200;
        }

        cfb-schedule-loader[data-state="done"],
        cfb-session-loader[data-state="done"] {
            border-color: #2e7d32;
            background: #f1f8e9;
            color: #1b5e20;
        }

        cfb-schedule-loader[data-state="error"],
        cfb-session-loader[data-state="error"] {
            border-color: #c62828;
            background: #ffebee;
            color: #b71c1c;
        }
    </style>
</head>
<body>

<header class="page-header">
    <h1>Step 7 — Load from Backend</h1>
    <p>fetch → IndexedDB → orchestrate → render</p>
</header>

<!-- ═══════════════════════════════════════════════════════════════════════════
     CONTROLS
     Click a button to swap the active event ID. Both loaders will re-fetch
     in parallel; the orchestrator bumps cfb-schedule only after both complete.
     ═══════════════════════════════════════════════════════════════════════════ -->
<section class="controls">
    <label>Load a conference:</label>
    <button data-load-event="codefreeze-2025" class="active">CodeFreeze 2025</button>
    <button data-load-event="devdays-2025">DevDays 2025</button>
</section>

<!-- ═══════════════════════════════════════════════════════════════════════════
     ORCHESTRATOR
     This is the component tree you are building. Read through the source files:

       cfb-board-orchestrator.js     — coordinates without fetching
       cfb-schedule-loader.js        — fetches schedule metadata
       cfb-session-loader.js         — fetches sessions list
       cfb-schedule.js               — reads IndexedDB and renders

     The loaders render their own status text so you can watch them in the DOM.
     ═══════════════════════════════════════════════════════════════════════════ -->
<cfb-board-orchestrator>

    <div class="loader-status">
        <cfb-schedule-loader data-event-id="codefreeze-2025">
        </cfb-schedule-loader>

        <cfb-session-loader class="listens-session-reloads" data-event-id="codefreeze-2025">
        </cfb-session-loader>
    </div>


    <cfb-header class="listens-event-changes" data-event-id="codefreeze-2025">
    </cfb-header>

    <cfb-updates-sessions class="listens-event-changes" data-event-id="codefreeze-2025">
        <cfb-add-session-form></cfb-add-session-form>
        <cfb-schedule class="listens-schedule-updates" data-event-id="codefreeze-2025">
        </cfb-schedule>
    </cfb-updates-sessions>
</cfb-board-orchestrator>

</body>
</html>
