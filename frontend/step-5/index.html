<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFreeze Board — Step 5: Add a Session</title>
    <link rel="stylesheet" href="../styles.css">
    <script type="module" src="index.js"></script>
    <style>
        body { margin: 0; background: #f5f5f5; font-family: system-ui, sans-serif; }
    </style>
</head>
<body>

<header class="page-header">
    <h1>Step 5 — Add a Session</h1>
    <p>Replace the random-session button with a real HTML form — use <code>FormData</code> to collect all values at once</p>
</header>

<!-- ═══════════════════════════════════════════════════════════════════════════
     Event flow — read these files in order:

       cfb-add-session-form.js   — form submit → FormData → fires cfb-session-created ↑
       cfb-session-store.js      — catches cfb-session-created + cfb-session-updated
                                   + cfb-session-removed
                                   → mutates IDB → fires sessionsLoaded ↑
       cfb-board-orchestrator.js — catches sessionsLoaded → pushes data-sessions ↓
       cfb-schedule.js (step-3)  — observes data-sessions → re-renders

     The only change from Step 4: <cfb-session-generator> is replaced by
     <cfb-add-session-form>. Everything else is identical.
     ═══════════════════════════════════════════════════════════════════════════ -->
<cfb-board-orchestrator>

    <cfb-session-loader></cfb-session-loader>

    <cfb-session-store>
        <cfb-add-session-form></cfb-add-session-form>
        <cfb-schedule class="listens-schedule-updates"></cfb-schedule>
    </cfb-session-store>

</cfb-board-orchestrator>

</body>
</html>
