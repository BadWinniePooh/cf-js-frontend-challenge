<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFreeze Board — Step 5: Add a Session</title>
    <link rel="stylesheet" href="../styles.css">
    <script type="module" src="index.js"></script>
    <style>
        body { margin: 0; background: #f5f5f5; font-family: system-ui, sans-serif; }
    </style>
</head>
<body>

<header class="page-header">
    <h1>Step 5 — Add a Session</h1>
    <p>Replace the random-session button with a real HTML form — use <code>FormData</code> to collect all values at once</p>
</header>

<!-- ═══════════════════════════════════════════════════════════════════════════
     Event flow — read these files in order:

       cfb-add-session-form.js   — form submit → FormData → fires cfb-session-created ↑
       cfb-session-store.js      — catches cfb-session-created + cfb-session-updated
                                   + cfb-session-removed → mutates IDB
                                   → fires cfb-sessions-loaded-to-idb ↑
       cfb-board-orchestrator.js — catches cfb-sessions-loaded-to-idb
                                   → sets data-latest-updated-at on .listens-schedule-updates
       cfb-schedule.js (step-4)  — observes data-latest-updated-at → getAllSessions() → re-renders

     Change from Step 4: <cfb-session-generator> is replaced by <cfb-add-session-form>.
     Loader + store + orchestrator + schedule pattern matches Step 4.
     ═══════════════════════════════════════════════════════════════════════════ -->
<cfb-board-orchestrator>

    <cfb-session-loader></cfb-session-loader>

    <cfb-session-store>
        <cfb-session-generator></cfb-session-generator>
        <cfb-schedule class="listens-schedule-updates"></cfb-schedule>
    </cfb-session-store>

</cfb-board-orchestrator>

</body>
</html>
