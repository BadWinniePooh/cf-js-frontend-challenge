<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFreeze Board — Step 2: &lt;cfb-session-card&gt;</title>
    <link rel="stylesheet" href="../styles.css">
    <script type="module" src="index.js"></script>
</head>
<body>

<header class="page-header">
    <h1>Step 2 — <code>&lt;cfb-session-card&gt;</code></h1>
    <p>Composing a molecule from smaller atoms</p>
</header>

<!-- ═══════════════════════════════════════════════════════════
     Use this area to test your <cfb-session-card> component.

     Once you have implemented cfb-session-card.js and registered
     it in index.js, try passing session data via a JSON attribute:

       <cfb-session-card data-session='{"title":"Opening Keynote",
         "tags":[{"label":"Keynote","color":"blue"}],
         "attendees":["AK","JS"]}'>
       </cfb-session-card>

     ═══════════════════════════════════════════════════════════ -->

<main style="padding: 24px; display: flex; flex-wrap: wrap; gap: 8px;">

    <cfb-session-card data-session='{"title": "Hello World", "tags": [{"label": "Social", "color": "green"}, {"label": "Frontend", "color": "red"}], "attendees": ["AK", "JS"]}'>
    </cfb-session-card>
    <cfb-session-card-alt data-title="Hello World" data-attendees='["AK", "JS"]' data-variant="travel">
        <cfb-tag data-label="Social" data-color="blue"></cfb-tag>
        <cfb-tag data-label="Frontend" data-color="purple"></cfb-tag>
    </cfb-session-card-alt>
    <cfb-session-card-alt2 data-title="Hello World" data-attendees='["AK", "JS"]'>
        <cfb-tag data-label="Social" data-color="blue"></cfb-tag>
        <cfb-tag data-label="Frontend" data-color="purple"></cfb-tag>
    </cfb-session-card-alt2>

</main>

</body>
</html>
