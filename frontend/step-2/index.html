<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFreeze Board — Step 1: &lt;cfb-tag&gt;</title>
    <link rel="stylesheet" href="../styles.css">
    <script type="module" src="index.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     Use this area to test your <cfb-tag> component.

     Once you have implemented cfb-tag.js and registered it in
     index.js, replace the <span> placeholders below with your
     custom elements, e.g.:

       <cfb-tag data-label="Keynote" data-color="blue"></cfb-tag>

     ═══════════════════════════════════════════════════════════ -->

<main style="padding: 24px; display: flex; flex-wrap: wrap; gap: 8px;">

    <cfb-session-card data-session='{"title": "Hello World", "tags": [{"label": "Social", "color": "green"}, {"label": "Frontend", "color": "red"}], "attendees": ["AK", "JS"]}'>
    </cfb-session-card>
    <cfb-session-card-alt data-title="Hello World" data-attendees='["AK", "JS"]' data-variant="travel">
        <cfb-tag data-label="Social" data-color="blue"></cfb-tag>
        <cfb-tag data-label="Frontend" data-color="purple"></cfb-tag>
    </cfb-session-card-alt>
    <cfb-session-card-alt2 data-title="Hello World" data-attendees='["AK", "JS"]'>
        <cfb-tag data-label="Social" data-color="blue"></cfb-tag>
        <cfb-tag data-label="Frontend" data-color="purple"></cfb-tag>
    </cfb-session-card-alt2>

</main>

</body>
</html>
